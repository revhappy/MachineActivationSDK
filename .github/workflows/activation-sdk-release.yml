name: Activation SDK Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'activation-sdk-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run release:verify

      # Publish steps only fire on a real release tag. workflow_dispatch runs the
      # verification above but stops short of publishing — that's the dry-run path.
      # Publish order matches dependency direction: activation-sdk first because
      # @machine/ui and @machine/activation-capacitor peer-depend on it.
      - name: Publish @machine/activation-sdk
        if: startsWith(github.ref, 'refs/tags/activation-sdk-v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish @machine/ui
        if: startsWith(github.ref, 'refs/tags/activation-sdk-v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @machine/ui --access public

      - name: Publish @machine/create-machine-app
        if: startsWith(github.ref, 'refs/tags/activation-sdk-v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @machine/create-machine-app --access public

      - name: Publish @machine/activation-capacitor
        if: startsWith(github.ref, 'refs/tags/activation-sdk-v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @machine/activation-capacitor --access public
